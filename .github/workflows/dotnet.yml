# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        sln_path:
          - src/DcsSymlinker.slnx
        
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0
    - name: Restore dependencies
      run: dotnet restore ${{ matrix.sln_path }}
    - name: Build
      run: dotnet build ${{ matrix.sln_path }} --no-restore
    - name: Test
      run: dotnet test src/DcsSymlinker.Tests/DcsSymlinker.Tests.csproj --no-build --verbosity normal
